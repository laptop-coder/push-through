name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  release:
    name: Release
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      version: ${{ steps.release.outputs.release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
      - name: Install semantic-release tools
        run: |
          npm install -g \
          @semantic-release/commit-analyzer \
          @semantic-release/release-notes-generator \
          @semantic-release/github \
          semantic-release
      - name: Release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx semantic-release --branches main --plugins "@semantic-release/commit-analyzer,@semantic-release/release-notes-generator,@semantic-release/github"
          VERSION=$(git describe --tags --abbrev=0)
          echo "release_version=$VERSION" >> $GITHUB_OUTPUT

  bump-version:
    name: Bump version in pubspec.yaml
    needs: release
    if: github.actor != 'github-actions[bot]' && needs.release.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.calc_and_update.outputs.new_version }}
      new_version_name: ${{ steps.calc_and_update.outputs.new_version_name }}
      new_version_code: ${{ steps.calc_and_update.outputs.new_version_code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Calculate and update version
        working-directory: ./app
        id: calc_and_update
        run: |
          NEW_VERSION_NAME=$(echo ${{ needs.release.outputs.version }} | sed 's/^v//')
          NEW_VERSION_CODE=$(awk -F '[+]' '/version:/ {print $2 + 1}' ./pubspec.yaml)
          NEW_VERSION=$NEW_VERSION_NAME+$NEW_VERSION_CODE
          sed -i "s/^version: .*/version: $NEW_VERSION/" pubspec.yaml
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "new_version_name=$NEW_VERSION_NAME" >> $GITHUB_OUTPUT
          echo "new_version_code=$NEW_VERSION_CODE" >> $GITHUB_OUTPUT
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
      - name: Commit and push changes
        working-directory: ./app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add ./pubspec.yaml
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m 'chore: bump version to `${{ steps.calc_and_update.outputs.new_version }}`'
          git push

  build-app:
    name: Build App (${{ matrix.os }})
    needs: [release, bump-version]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    if: github.actor != 'github-actions[bot]' && needs.release.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        shell: bash
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > app/.keystore.jks

      - name: Create key.properties
        env:
          KEY_PROPERTIES: ${{ secrets.KEY_PROPERTIES }}
        shell: bash
        run: |
          echo "$KEY_PROPERTIES" > app/android/key.properties

      - name: Get Flutter packages
        working-directory: ./app
        shell: bash
        run: flutter pub get

      - name: Build for Android
        working-directory: ./app
        if: runner.os == 'Linux'
        run: |
          CODE_ARM64=$((${{ needs.bump-version.outputs.new_version_code }} * 10 + 1))
          CODE_ARM32=$((${{ needs.bump-version.outputs.new_version_code }} * 10 + 2))
          CODE_X86_64=$((${{ needs.bump-version.outputs.new_version_code }} * 10 + 3))

          echo "CODE_ARM64=$CODE_ARM64" >> $GITHUB_ENV
          echo "CODE_ARM32=$CODE_ARM32" >> $GITHUB_ENV
          echo "CODE_X86_64=$CODE_X86_64" >> $GITHUB_ENV

          flutter build apk --release --target-platform android-arm64 --build-name=${{ needs.bump-version.outputs.new_version_name }} --build-number=$CODE_ARM64
          mv build/app/outputs/flutter-apk/app-release.apk push_through-${{ needs.bump-version.outputs.new_version_name }}+$CODE_ARM64-android-arm64-v8a.apk
          flutter build apk --release --target-platform android-arm --build-name=${{ needs.bump-version.outputs.new_version_name }} --build-number=$CODE_ARM32
          mv build/app/outputs/flutter-apk/app-release.apk push_through-${{ needs.bump-version.outputs.new_version_name }}+$CODE_ARM32-android-armeabi-v7a.apk
          flutter build apk --release --target-platform android-x64 --build-name=${{ needs.bump-version.outputs.new_version_name }} --build-number=$CODE_X86_64
          mv build/app/outputs/flutter-apk/app-release.apk push_through-${{ needs.bump-version.outputs.new_version_name }}+$CODE_X86_64-android-x86_64.apk
          flutter build appbundle --release
          mv build/app/outputs/bundle/release/app-release.aab push_through-${{ needs.bump-version.outputs.new_version }}-android.aab
      - name: Upload Android binaries
        if: runner.os == 'Linux'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release.outputs.version }}
          files: |
            app/push_through-${{ needs.bump-version.outputs.new_version_name }}+${{ env.CODE_ARM64 }}-android-arm64-v8a.apk
            app/push_through-${{ needs.bump-version.outputs.new_version_name }}+${{ env.CODE_ARM32 }}-android-armeabi-v7a.apk
            app/push_through-${{ needs.bump-version.outputs.new_version_name }}+${{ env.CODE_X86_64 }}-android-x86_64.apk
            app/push_through-${{ needs.bump-version.outputs.new_version }}-android.aab
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build for iOS
        working-directory: ./app
        if: runner.os == 'macOS'
        run: flutter build ios --release --no-codesign --build-name=${{ needs.bump-version.outputs.new_version_name }} --build-number=${{ needs.bump-version.outputs.new_version_code }}
      - name: Zip iOS binaries
        if: runner.os == 'macOS'
        working-directory: ./app
        run: |
          cd build/ios/iphoneos/Runner.app
          zip -r ../../../../push_through-${{ needs.bump-version.outputs.new_version }}-ios.zip *
      - name: Upload iOS binaries
        if: runner.os == 'macOS'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release.outputs.version }}
          files: app/push_through-${{ needs.bump-version.outputs.new_version }}-ios.zip
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build for Linux
        working-directory: ./app
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev
          flutter build linux
      - name: Zip Linux binaries
        if: runner.os == 'Linux'
        working-directory: ./app
        run: |
          cd build/linux/x64/release/bundle
          zip -r ../../../../../push_through-${{ needs.bump-version.outputs.new_version_name }}-linux-x86_64-portable.zip *
      - name: Upload Linux binaries
        if: runner.os == 'Linux'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release.outputs.version }}
          files: app/push_through-${{ needs.bump-version.outputs.new_version_name }}-linux-x86_64-portable.zip
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build for Windows
        working-directory: ./app
        shell: bash
        if: runner.os == 'Windows'
        run: flutter build windows
      - name: Zip Windows binaries
        if: runner.os == 'Windows'
        working-directory: ./app
        shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath push_through-${{ needs.bump-version.outputs.new_version_name }}-windows-x86_64-portable.zip
      - name: Upload Windows binaries
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release.outputs.version }}
          files: app/push_through-${{ needs.bump-version.outputs.new_version_name }}-windows-x86_64-portable.zip
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build for macOS
        working-directory: ./app
        if: runner.os == 'macOS'
        run: flutter build macos
      - name: Zip macOS binaries
        if: runner.os == 'macOS'
        working-directory: ./app
        run: |
          cd build/macos/Build/Products/Release/push_through.app/
          zip -r ../../../../../../push_through-${{ needs.bump-version.outputs.new_version_name }}-macos-x86_64.zip *
      - name: Upload macOS binaries
        if: runner.os == 'macOS'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release.outputs.version }}
          files: app/push_through-${{ needs.bump-version.outputs.new_version_name }}-macos-x86_64.zip
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

